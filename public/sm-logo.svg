<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" rx="28" fill="#000"></rect>
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-size="58" font-family="monospace" fill="url(#grad)" filter="url(#glow)">
    SM
  </text>
</svg>